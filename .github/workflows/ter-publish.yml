name: Publish to TER

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to publish (e.g. 1.3.0, with or without leading v)'
        required: true

jobs:
  publish:
    name: Publish to TYPO3 TER
    runs-on: ubuntu-latest
    env:
      TYPO3_EXTENSION_KEY: nt_supporttimes
      TYPO3_API_TOKEN: ${{ secrets.TYPO3_API_TOKEN }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          extensions: intl, mbstring, json, zip, curl
          tools: composer:v2

      - name: Determine version and comment
        id: meta
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            RAW="${{ github.event.inputs.version }}"
          else
            RAW="${GITHUB_REF#refs/tags/}"
          fi
          # TER versions must not carry a leading "v"
          VERSION="${RAW#v}"
          TAG="v${VERSION}"
          COMMENT="$(git tag -l --format='%(contents:subject)' "$TAG")"
          if [ -z "$COMMENT" ]; then
            COMMENT="Released ${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "comment=${COMMENT}" >> "$GITHUB_OUTPUT"

      - name: Install tailor
        run: |
          composer global require typo3/tailor
          echo "$(composer global config home)/vendor/bin" >> "$GITHUB_PATH"

      - name: Publish to TER
        env:
          COMMENT: ${{ steps.meta.outputs.comment }}
        run: tailor ter:publish --comment "$COMMENT" "${{ steps.meta.outputs.version }}"
