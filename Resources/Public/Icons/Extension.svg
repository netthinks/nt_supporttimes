<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background -->
  <rect width="64" height="64" rx="8" fill="#FF8700"/>
  
  <!-- Calendar icon -->
  <rect x="14" y="18" width="36" height="32" rx="2" fill="white" opacity="0.95"/>
  
  <!-- Calendar header -->
  <rect x="14" y="18" width="36" height="8" rx="2" fill="#FF8700" opacity="0.3"/>
  
  <!-- Calendar binding rings -->
  <circle cx="22" cy="16" r="2" fill="white"/>
  <circle cx="32" cy="16" r="2" fill="white"/>
  <circle cx="42" cy="16" r="2" fill="white"/>
  
  <!-- Calendar grid -->
  <line x1="20" y1="30" x2="44" y2="30" stroke="#FF8700" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="36" x2="44" y2="36" stroke="#FF8700" stroke-width="1" opacity="0.3"/>
  <line x1="20" y1="42" x2="44" y2="42" stroke="#FF8700" stroke-width="1" opacity="0.3"/>
  
  <line x1="26" y1="26" x2="26" y2="48" stroke="#FF8700" stroke-width="1" opacity="0.3"/>
  <line x1="32" y1="26" x2="32" y2="48" stroke="#FF8700" stroke-width="1" opacity="0.3"/>
  <line x1="38" y1="26" x2="38" y2="48" stroke="#FF8700" stroke-width="1" opacity="0.3"/>
  
  <!-- Timeline/roadmap indicator -->
  <path d="M 18 40 L 24 40 L 28 36 L 34 44 L 40 38 L 46 38" 
        stroke="white" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
