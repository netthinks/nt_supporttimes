<html xmlns:f="http://typo3.org/ns/TYPO3/CMS/Fluid/ViewHelpers" data-namespace-typo3-fluid="true">

<div style="height: 100%; display: flex; flex-direction: column; overflow: hidden;">
    <div class="widget-content-header" style="flex: 0 0 auto; padding: 1rem 1rem 0.5rem;">
        <h4 style="margin: 0 0 0.5rem;">
            <f:translate key="widget.header" extensionName="nt_supporttimes" />
        </h4>
        <p class="text-muted" style="margin: 0; font-size: 0.875rem;">
            <f:translate key="widget.description" extensionName="nt_supporttimes" />
        </p>
    </div>

    <div style="flex: 1 1 auto; overflow-y: auto; overflow-x: hidden; padding: 0 1rem 1rem;">
        <table class="table table-striped table-hover table-sm" style="margin-bottom: 35px;">
            <thead>
                <tr>
                    <th style="position: sticky; top: 0; background: var(--typo3-component-bg, #fff); z-index: 1;">
                        <f:translate key="header.version" extensionName="nt_supporttimes" />
                    </th>
                    <th style="position: sticky; top: 0; background: var(--typo3-component-bg, #fff); z-index: 1;">
                        <f:translate key="header.latest" extensionName="nt_supporttimes" />
                    </th>
                    <th style="position: sticky; top: 0; background: var(--typo3-component-bg, #fff); z-index: 1;">
                        <f:translate key="header.support_official" extensionName="nt_supporttimes" />
                    </th>
                    <f:if condition="{options.showElts}">
                        <th style="position: sticky; top: 0; background: var(--typo3-component-bg, #fff); z-index: 1;">
                            <f:translate key="header.support_elts" extensionName="nt_supporttimes" />
                        </th>
                    </f:if>
                    <th style="position: sticky; top: 0; background: var(--typo3-component-bg, #fff); z-index: 1;">
                        <f:translate key="header.status" extensionName="nt_supporttimes" />
                    </th>
                </tr>
            </thead>
            <tbody>
                <f:if condition="{releaseData}">
                    <f:then>
                        <f:for each="{releaseData}" as="version">
                            <tr>
                                <td><strong>TYPO3 {version.version}</strong></td>
                                <td>
                                    <a href="{version.releaseUrl}" target="_blank"
                                        rel="noopener noreferrer">{version.latest}</a>
                                    <f:if condition="{version.latestDate}">
                                        <br><span class="text-muted small">(<f:format.date format="d.m.Y">
                                                {version.latestDate}</f:format.date>)</span>
                                    </f:if>
                                </td>
                                <td>
                                    <f:if condition="{version.support.official}">
                                        <f:format.date format="d.m.Y">{version.support.official}</f:format.date>
                                    </f:if>
                                </td>
                                <f:if condition="{options.showElts}">
                                    <td>
                                        <f:if condition="{version.elts}">
                                            <f:format.date format="d.m.Y">{version.elts}</f:format.date>
                                        </f:if>
                                    </td>
                                </f:if>
                                <td>
                                    <span class="badge badge-{version.statusClass}">
                                        <f:translate key="status.{version.status}" extensionName="nt_supporttimes" />
                                    </span>
                                </td>
                            </tr>
                        </f:for>
                    </f:then>
                    <f:else>
                        <tr>
                            <td colspan="5" class="text-center">
                                <f:translate key="msg.no_data" extensionName="nt_supporttimes" />
                            </td>
                        </tr>
                    </f:else>
                </f:if>
            </tbody>
        </table>
    </div>
</div>

</html>
